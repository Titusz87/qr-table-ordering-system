spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  datasource:
    url: jdbc:h2:mem:order-service-db
    driver-class-name: org.h2.Driver
    generate-unique-name: false
    name: order-service-db
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG